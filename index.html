<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Meet</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:15px;
text-align:center;
font-size:20px;
background:#111827;
}

#joinScreen{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
flex:1;
gap:15px;
}

input{
padding:10px;
border-radius:8px;
border:none;
width:220px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#2563eb;
}

#callScreen{
display:none;
flex-direction:column;
height:100%;
}

#videos{
flex:1;
display:flex;
justify-content:center;
align-items:center;
gap:20px;
padding:20px;
}

video{
width:45%;
max-width:500px;
border-radius:12px;
background:black;
}

#controls{
display:flex;
justify-content:center;
gap:15px;
padding:15px;
background:#111827;
}

.control-btn{
background:#1f2937;
}

.control-btn:hover{
background:#374151;
}

.leave{
background:#ef4444;
}

.leave:hover{
background:#dc2626;
}

</style>
</head>

<body>

<header>Mini Meet</header>

<div id="joinScreen">

<input id="roomInput" placeholder="Enter Room ID">
<button onclick="joinRoom()">Join Room</button>

</div>


<div id="callScreen">

<div id="videos">
<video id="myVideo" autoplay muted playsinline></video>
<video id="userVideo" autoplay playsinline></video>
</div>

<div id="controls">
<button class="control-btn" onclick="toggleMute()">Mute</button>
<button class="control-btn" onclick="toggleCamera()">Camera Off</button>
<button class="leave" onclick="leaveCall()">Leave</button>
</div>

</div>


<script>

let peer
let myStream
let currentCall
let muted=false
let cameraOff=false

const myVideo=document.getElementById("myVideo")
const userVideo=document.getElementById("userVideo")

async function joinRoom(){

const room=document.getElementById("roomInput").value.trim()

if(!room) return alert("Enter room ID")

document.getElementById("joinScreen").style.display="none"
document.getElementById("callScreen").style.display="flex"

myStream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
})

myVideo.srcObject=myStream

peer = new Peer(room)

peer.on("call", call => {

call.answer(myStream)

call.on("stream", stream=>{
userVideo.srcObject=stream
})

currentCall=call

})

peer.on("open", id=>{

if(id!==room){

const call=peer.call(room,myStream)

call.on("stream",stream=>{
userVideo.srcObject=stream
})

currentCall=call

}

})

}

function toggleMute(){

muted=!muted

myStream.getAudioTracks()[0].enabled=!muted

}

function toggleCamera(){

cameraOff=!cameraOff

myStream.getVideoTracks()[0].enabled=!cameraOff

}

function leaveCall(){

if(currentCall) currentCall.close()

if(peer) peer.destroy()

location.reload()

}

</script>

</body>
</html>
